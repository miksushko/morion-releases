<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Activating Morion Pro…</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0a0a;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #111;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 32px 28px;
    }
    h1 { margin: 0 0 8px; font-size: 22px; font-weight: 600; }
    p { margin: 0 0 16px; color: #a3a3a3; font-size: 14px; line-height: 1.55; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #262626;
      border-top-color: #fafafa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ok-mark {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(16,185,129,0.15); color: #10b981;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 20px; margin: 0 auto 16px;
    }
    .btn {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      margin-top: 8px;
    }
    .btn.secondary { background: transparent; color: #a3a3a3; border: 1px solid #404040; }
    .sub { font-size: 12px; color: #737373; margin-top: 20px; }
    code { background: #0a0a0a; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>Activating Morion Pro…</h1>
    <p id="status">Opening Morion on this Mac.</p>
    <a id="retry" class="btn" style="display:none" href="#">Open Morion manually</a>
    <p class="sub" id="fallback" style="display:none">
      If Morion doesn&apos;t open, we&apos;ve also emailed your license key.
      Open Morion → gear → Subscription → paste the key to activate.
    </p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const sessionId = params.get('session_id');
      const status = document.getElementById('status');
      const retry = document.getElementById('retry');
      const fallback = document.getElementById('fallback');

      if (!sessionId) {
        status.textContent = 'Missing session_id in URL.';
        return;
      }

      const deepLink = 'morion://activate?session_id=' + encodeURIComponent(sessionId);
      retry.href = deepLink;

      // Primary trigger: redirect to the custom scheme. macOS hands this
      // off to the Morion app which captures it via tauri-plugin-deep-link.
      // We also show the manual link + email fallback after a brief delay
      // in case the handoff failed (app not installed, scheme not registered).
      setTimeout(function () {
        window.location.href = deepLink;
      }, 50);

      setTimeout(function () {
        status.textContent = 'If Morion didn\u2019t open, use one of the options below.';
        retry.style.display = 'inline-block';
        fallback.style.display = 'block';
      }, 2000);
    })();
  </script>
</body>
</html>
